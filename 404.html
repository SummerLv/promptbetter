<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - PromptBetter</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: #f9fafb; --bg-secondary: #ffffff; --text-primary: #111827;
            --text-secondary: #4b5563; --border-color: #f3f4f6;
        }
        html.dark {
            --bg-primary: #1a1a2e; --bg-secondary: #16213e; --text-primary: #e2e8f0;
            --text-secondary: #a0aec0; --border-color: #2d3748;
        }
        html.dark body { background: var(--bg-primary); color: var(--text-primary); }
        html.dark .card { background: var(--bg-secondary); border-color: var(--border-color); }
        html.dark .nav-bar { background: var(--bg-secondary); border-color: var(--border-color); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="nav-bar bg-white shadow-sm border-b border-gray-100 py-4">
        <div class="max-w-7xl mx-auto px-4 flex items-center space-x-2">
            <span class="text-2xl">⚡</span>
            <a href="/" class="text-xl font-bold" style="color:var(--text-primary)">Prompt<span class="text-indigo-500">Better</span></a>
        </div>
    </nav>
    <main class="flex-1 flex items-center justify-center px-4">
        <div class="text-center max-w-lg">
            <div class="text-8xl mb-6">🔍</div>
            <h1 class="text-5xl font-bold mb-3" style="color:var(--text-primary)">404</h1>
            <p class="text-xl mb-2" style="color:var(--text-secondary)">Page not found</p>
            <p class="mb-8" style="color:var(--text-secondary)">
                The prompt you're looking for doesn't exist. But we have 80+ free prompts waiting for you!
            </p>
            <a href="/" class="inline-block bg-indigo-500 hover:bg-indigo-600 text-white font-bold px-8 py-3 rounded-xl transition">
                ← Back to All Prompts
            </a>
            <div class="mt-10 border-t pt-8" style="border-color:var(--border-color)">
                <p class="text-sm font-semibold mb-4" style="color:var(--text-secondary)">Popular prompts to try:</p>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-left">
                    <a href="/" class="card block p-3 bg-white border border-gray-100 rounded-lg hover:shadow-md transition">
                        <span class="text-sm font-medium" style="color:var(--text-primary)">✍️ Blog Post Writer</span>
                    </a>
                    <a href="/" class="card block p-3 bg-white border border-gray-100 rounded-lg hover:shadow-md transition">
                        <span class="text-sm font-medium" style="color:var(--text-primary)">💻 Code Reviewer</span>
                    </a>
                    <a href="/" class="card block p-3 bg-white border border-gray-100 rounded-lg hover:shadow-md transition">
                        <span class="text-sm font-medium" style="color:var(--text-primary)">📈 SEO Strategy</span>
                    </a>
                    <a href="/" class="card block p-3 bg-white border border-gray-100 rounded-lg hover:shadow-md transition">
                        <span class="text-sm font-medium" style="color:var(--text-primary)">📄 Cover Letter Writer</span>
                    </a>
                </div>
            </div>
        </div>
    </main>
    <footer class="py-6 text-center text-sm" style="color:var(--text-secondary)">
        <p>&copy; 2026 PromptBetter. All rights reserved.</p>
    </footer>
    <script>
        if (localStorage.getItem('darkMode') === 'true' || (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
