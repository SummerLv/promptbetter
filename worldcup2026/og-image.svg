<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D3B0F"/>
      <stop offset="50%" style="stop-color:#1B5E20"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle field lines -->
  <circle cx="600" cy="315" r="120" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="2"/>
  <rect x="350" y="0" width="500" height="630" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="2" rx="0"/>

  <!-- Football/soccer ball -->
  <circle cx="980" cy="160" r="80" fill="white" opacity="0.12"/>
  <path d="M980 80 L1000 110 L990 145 L970 145 L960 110 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <circle cx="980" cy="160" r="80" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <!-- Pentagon pattern on ball -->
  <polygon points="980,120 1000,133 994,155 966,155 960,133" fill="rgba(0,0,0,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Small footballs scattered -->
  <circle cx="150" cy="500" r="30" fill="white" opacity="0.06"/>
  <circle cx="1080" cy="480" r="25" fill="white" opacity="0.05"/>

  <!-- Trophy icon -->
  <text x="120" y="200" font-size="80" opacity="0.15">🏆</text>

  <!-- Main Title -->
  <text x="600" y="240" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">FIFA World Cup 2026</text>

  <!-- Subtitle with gold gradient -->
  <text x="600" y="320" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="700" fill="url(#gold)" text-anchor="middle">Schedule &amp; Time Zone Converter</text>

  <!-- Divider line -->
  <rect x="400" y="360" width="400" height="2" fill="rgba(255,255,255,0.2)" rx="1"/>

  <!-- Bottom info -->
  <text x="600" y="430" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.8)" text-anchor="middle">USA · Mexico · Canada</text>
  <text x="600" y="480" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.6)" text-anchor="middle">June 11 - July 19, 2026 | 48 Teams | 104 Matches</text>

  <!-- Football emoji at bottom -->
  <text x="600" y="560" font-size="40" text-anchor="middle" opacity="0.7">⚽</text>

  <!-- Corner accent -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#gold)" opacity="0.8"/>
</svg>
