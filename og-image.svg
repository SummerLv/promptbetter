<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle overlay for depth -->
  <rect width="1200" height="315" fill="url(#shine)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="900" cy="80" r="120" fill="rgba(255,255,255,0.02)"/>

  <!-- Lightning bolt icon -->
  <text x="600" y="220" font-family="Arial, sans-serif" font-size="80" text-anchor="middle" fill="#fbbf24">&#x26A1;</text>

  <!-- Main title -->
  <text x="600" y="320" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#ffffff">PromptBetter</text>

  <!-- Subtitle -->
  <text x="600" y="400" font-family="Arial, Helvetica, sans-serif" font-size="36" text-anchor="middle" fill="rgba(255,255,255,0.9)">80+ Free AI Prompt Templates</text>

  <!-- Divider line -->
  <rect x="450" y="440" width="300" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>

  <!-- Bottom text - AI models -->
  <text x="600" y="500" font-family="Arial, Helvetica, sans-serif" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.7)">ChatGPT &#xB7; Claude &#xB7; Gemini &#xB7; Midjourney</text>

  <!-- URL -->
  <text x="600" y="580" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle" fill="rgba(255,255,255,0.5)">promptbetter.dev</text>
</svg>
